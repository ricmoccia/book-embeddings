<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60">
  <!-- 1-stack book embedding logo: three vertices on a spine,
       three arcs colored after the block-chromatism palette
       used in the visualizer. -->
