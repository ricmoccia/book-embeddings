  <path d="M 50 44 A 17 17 0 0 1 84 44" stroke="#f0a040" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M 16 44 A 34 34 0 0 1 84 44" stroke="#1f7a8c" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <circle cx="16" cy="44" r="6" fill="#1f2937"/>
  <circle cx="50" cy="44" r="6" fill="#1f2937"/>
  <circle cx="84" cy="44" r="6" fill="#1f2937"/>
</svg>
